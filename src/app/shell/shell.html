<div class="tl-shell">
  <!-- Top bar -->
  <header class="tl-topbar tl-no-print">
    <a class="brand" routerLink="/dashboard">
      <span class="brand-logo">🍵</span>
      <span class="brand-name">Tea Ledger</span>
    </a>

    <nav class="tl-topnav">
      @for (item of visibleNav(); track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" class="tl-navlink">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <button
      mat-icon-button
      class="theme-btn"
      (click)="toggleTheme()"
      [matTooltip]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button type="button" class="user-btn" [matMenuTriggerFor]="userMenu" aria-label="Account">
      <span class="user-avatar">{{ initials() }}</span>
      <span class="user-name">{{ user()?.name }}</span>
      <mat-icon class="user-caret">arrow_drop_down</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-user" (click)="$event.stopPropagation()">
        <div class="menu-name">{{ user()?.name }}</div>
        <div class="menu-email">{{ user()?.email }}</div>
        <span class="tl-chip role-{{ user()?.role }}">{{ user()?.role }}</span>
      </div>
      @if (canChangePassword()) {
        <button mat-menu-item (click)="changePassword()">
          <mat-icon>lock_reset</mat-icon>
          <span>Change my password</span>
        </button>
      }
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </header>

  <!-- Page content -->
  <main class="tl-main">
    <router-outlet />
  </main>

  <!-- Floating Add Entry button -->
  <button
    class="tl-fab tl-no-print"
    mat-fab
    color="primary"
    (click)="addEntry()"
    matTooltip="Add Entry"
    aria-label="Add Entry"
  >
    <mat-icon>add</mat-icon>
    <span class="tl-fab-label">Add Entry</span>
  </button>

  <!-- Mobile bottom nav -->
  <nav class="tl-bottomnav tl-no-print">
    @for (item of visibleNav(); track item.path) {
      <a [routerLink]="item.path" routerLinkActive="active" class="tl-bottomlink">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
